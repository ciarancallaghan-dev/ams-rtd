<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMS-RTD">
<link rel="manifest" href="manifest.json">
<title>AMS - RTD Trains</title>
<style>
:root {
  --blue:    #00587a;
  --green:   #34C759;
  --orange:  #FF9500;
  --red:     #FF3B30;
  --bg:      #F2F2F7;
  --card:    #FFFFFF;
  --text:    #1C1C1E;
  --sub:     #6C6C70;
  --sep:     #E5E5EA;
  --radius:  14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100svh;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
}

/* Header */
.header {
  background: var(--blue);
  padding: 12px 20px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  color: #fff;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.direction-toggle {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.15); border: none; border-radius: 20px;
  padding: 6px 14px; color: #fff; font-size: 17px; font-weight: 600; cursor: pointer;
}
.header-btns { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.15); border: none; border-radius: 50%;
  color: #fff; font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.status-line {
  margin-top: 8px; font-size: 12px;
  color: rgba(255,255,255,0.65);
  display: flex; justify-content: space-between; align-items: center;
}
.live-dot {
  display: inline-block; width: 7px; height: 7px;
  border-radius: 50%; background: var(--green); margin-right: 5px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Settings */
.settings {
  background: var(--card); border-bottom: 1px solid var(--sep);
  overflow: hidden; max-height: 0; transition: max-height 0.3s ease;
}
.settings.open { max-height: 320px; }
.settings-inner { padding: 16px 20px; display: flex; flex-direction: column; gap: 18px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.setting-label { font-size: 15px; font-weight: 500; }
.setting-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }
.stepper { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.step-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--blue); border: none; color: #fff;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.step-val { font-size: 17px; font-weight: 600; min-width: 52px; text-align: center; }
.time-control { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.time-input {
  font-size: 14px; font-family: inherit; padding: 6px 10px;
  border: 1.5px solid var(--sep); border-radius: 9px;
  background: var(--bg); color: var(--text); outline: none; -webkit-appearance: none;
}
.time-input:focus { border-color: var(--blue); }
.now-btn {
  font-size: 12px; font-weight: 600; color: var(--blue);
  background: none; border: 1.5px solid var(--blue);
  border-radius: 20px; padding: 3px 12px; cursor: pointer;
}

/* List */
.list { padding: 12px 16px; }

/* Card */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.route-tag { font-size: 12px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; }
.duration-tag {
  font-size: 13px; font-weight: 700; color: var(--blue);
  background: #E8F4F8; padding: 3px 9px; border-radius: 10px;
}
.fastest-tag {
  font-size: 11px; font-weight: 700; color: #fff;
  background: var(--green); padding: 3px 8px; border-radius: 10px; margin-left: 6px;
}

/* Timeline */
.timeline { display: flex; gap: 10px; }
.tl-dots { display: flex; flex-direction: column; align-items: center; padding-top: 5px; flex-shrink: 0; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
.dot.end { background: var(--red); }
.dot.mid { background: var(--orange); width: 7px; height: 7px; }
.tl-line { width: 2px; flex: 1; min-height: 14px; background: var(--sep); margin: 3px 0; }
.tl-line.dashed {
  background: repeating-linear-gradient(to bottom, var(--sep) 0px, var(--sep) 4px, transparent 4px, transparent 8px);
}
.tl-stops { flex: 1; display: flex; flex-direction: column; }

/* Stop */
.stop { display: flex; align-items: flex-start; gap: 8px; padding: 0 0 2px; }
.stop-time { font-size: 18px; font-weight: 700; min-width: 48px; line-height: 1.2; }
.stop-time.est { color: var(--sub); }
.stop-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
.stop-detail { font-size: 12px; color: var(--sub); margin-top: 1px; }

/* Transfer */
.xfer {
  margin: 6px 0; padding: 7px 10px; background: var(--bg);
  border-radius: 8px; display: flex; align-items: center; gap: 8px;
}
.xfer-ok  { color: var(--green); }
.xfer-warn{ color: var(--orange); }
.xfer-bad { color: var(--red); }
.xfer-text { font-size: 13px; font-weight: 600; }
.xfer-sub  { font-size: 11px; color: var(--sub); }

/* Badges */
.badge {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle;
}
.badge-ic    { background: #003F6B; color: #fff; }
.badge-icd   { background: #E8600A; color: #fff; }
.badge-spr   { background: #0076BD; color: #fff; }
.badge-metro { background: #E4003A; color: #fff; }
.delay { color: var(--orange); font-weight: 600; font-size: 12px; margin-left: 4px; }

/* States */
.loading { text-align: center; padding: 60px 20px; color: var(--sub); }
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--sep);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error {
  margin: 20px 16px; background: #FFF0F0; border: 1px solid #FFCDD2;
  border-radius: var(--radius); padding: 20px; text-align: center;
}
.error-title { font-weight: 600; margin-bottom: 4px; }
.error-sub { font-size: 13px; color: var(--sub); margin-bottom: 14px; }
.retry-btn {
  background: var(--blue); color: #fff; border: none;
  padding: 9px 22px; border-radius: 10px; font-size: 15px; cursor: pointer;
}
.info-box {
  margin: 20px 16px; background: #FFF9E6; border: 1px solid #FFE580;
  border-radius: var(--radius); padding: 16px;
}
.info-box-title { font-weight: 600; font-size: 15px; margin-bottom: 6px; }
.info-box-text  { font-size: 13px; color: var(--sub); line-height: 1.5; }
.info-box a     { color: var(--blue); }
.empty { text-align: center; padding: 50px 20px; color: var(--sub); font-size: 15px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <button class="direction-toggle" onclick="flipDirection()">
      <span id="dirFrom">Amsterdam C.</span>
      <span style="font-size:14px;opacity:0.8">&#8594;</span>
      <span id="dirTo">Rotterdam C.</span>
    </button>
    <div class="header-btns">
      <button class="icon-btn" onclick="toggleSettings()">&#9881;</button>
      <button class="icon-btn" id="refreshBtn" onclick="refresh()">&#8635;</button>
    </div>
  </div>
  <div class="status-line">
    <span id="statusText"><span class="live-dot"></span>Loading...</span>
    <span id="updatedText"></span>
  </div>
</div>

<div class="settings" id="settingsPanel">
  <div class="settings-inner">
    <div class="setting-row">
      <div>
        <div class="setting-label">Schiphol transfer time</div>
        <div class="setting-sub">Your minimum to change platforms</div>
      </div>
      <div class="stepper">
        <button class="step-btn" onclick="changeShl(-1)">&#8722;</button>
        <div class="step-val"><span id="shlVal">2</span> min</div>
        <button class="step-btn" onclick="changeShl(1)">+</button>
      </div>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">Departure time</div>
        <div class="setting-sub">Live data: up to ~4 hrs ahead only</div>
      </div>
      <div class="time-control">
        <input type="datetime-local" id="deptTime" class="time-input" onchange="refresh()">
        <button class="now-btn" onclick="clearTime()">&#9679; Live now</button>
      </div>
    </div>
  </div>
</div>

<div class="list" id="journeyList">
  <div class="loading"><div class="spinner"></div><p>Fetching train times...</p></div>
</div>

<script>
// ── Config ───────────────────────────────────────────────────────────
let shlMin = parseInt(localStorage.getItem('shl') || '2');
document.getElementById('shlVal').textContent = shlMin;

// Maximum offset the live API reliably supports (~4 hours)
const MAX_OFFSET_MIN = 240;

// ── GVB Metro line 52 timetable ──────────────────────────────────────
function getMetroTime(refDate) {
  const d   = refDate || new Date();
  const h   = d.getHours() + d.getMinutes() / 60;
  const day = d.getDay();
  const wd  = day >= 1 && day <= 5;
  const freq = wd && ((h >= 6.5 && h < 9.0) || (h >= 16.0 && h < 18.5)) ? 5
             : !wd ? 10 : 7.5;
  return { total: Math.round(freq / 2 + 14), freq };
}

// ── State ────────────────────────────────────────────────────────────
let direction    = 'AMS_RTD';
let refreshTimer = null;
let isLoading    = false;

// ── Utilities ────────────────────────────────────────────────────────
const addMin  = (d, m) => new Date(+d + m * 60000);
const diffMin = (a, b) => (+b - +a) / 60000;
const fmt     = d => d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
const fmtDur  = m => m >= 60 ? `${Math.floor(m/60)}h ${m % 60}m` : `${m}m`;

function getSelectedTime() {
  const v = document.getElementById('deptTime').value;
  return v ? new Date(v) : new Date();
}
function isLiveMode() { return !document.getElementById('deptTime').value; }
function getOffset() {
  if (isLiveMode()) return 0;
  return Math.max(0, Math.round((+getSelectedTime() - Date.now()) / 60000));
}

function actualDepart(dep) {
  return addMin(new Date(dep.departureTime), (dep.delaySeconds || 0) / 60);
}
function actualArrive(arr) {
  const delay = (arr.delaySeconds || arr.delay || 0) / 60;
  return addMin(new Date(arr.arrivalTime), delay);
}

function goesTo(dep, word)  { return (dep.destination || '').toLowerCase().includes(word); }
function goesVia(dep, word) {
  return (dep.via || '').toLowerCase().includes(word) ||
         (dep.destination || '').toLowerCase().includes(word);
}
function isICDirect(dep) {
  const t = (dep.transportType || '').toLowerCase();
  return t.includes('direct') || t.includes('eurocity') || t.includes('eurostar');
}
function isSprinter(dep) { return (dep.transportType || '').toLowerCase().includes('sprinter'); }

function trainBadge(dep) {
  const t = (dep.transportType || '').toLowerCase();
  if (t.includes('direct') || t.includes('eurocity') || t.includes('eurostar'))
    return '<span class="badge badge-icd">ICD</span>';
  if (t.includes('intercity') || t.includes('ic'))
    return '<span class="badge badge-ic">IC</span>';
  if (t.includes('sprinter'))
    return '<span class="badge badge-spr">SPR</span>';
  return `<span class="badge badge-ic">${dep.transportType || ''}</span>`;
}

// Look up exact arrival at a station for a given service (returns null if not in live window)
function exactArrival(serviceNumber, arrMap) {
  const a = arrMap.get(String(serviceNumber));
  if (a) return { arr: actualArrive(a), pf: a.platform };
  return { arr: null, pf: null };
}

// ── API ──────────────────────────────────────────────────────────────
async function apiFetch(url) {
  try {
    const r = await fetch(url, { headers: { Accept: 'application/json' } });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  } catch {
    const proxy = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
    const r = await fetch(proxy);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
}

async function fetchDeps(station, offset = 0) {
  const url = `https://www.rijdendetreinen.nl/en/ajax/departures?station=${station}${offset > 0 ? '&offset=' + offset : ''}`;
  const d = await apiFetch(url);
  return d.departures || [];
}

async function fetchArrivals(station, offset = 0) {
  const url = `https://www.rijdendetreinen.nl/en/ajax/arrivals?station=${station}${offset > 0 ? '&offset=' + offset : ''}`;
  const d = await apiFetch(url);
  // Build map: serviceNumber → arrival object
  return new Map((d.arrivals || []).map(a => [String(a.serviceNumber), a]));
}

// ── Journey calculations ─────────────────────────────────────────────
function calcAMStoRTD(deps, arrRTD, arrSHL, refTime) {
  const { asd, shl } = deps;
  const cutoff  = addMin(refTime, -3);
  const journeys = [];

  // 1. Direct ASD → RTD (includes trains where Rotterdam is via, not just final destination)
  asd.filter(d => goesVia(d, 'rotterdam')).forEach(d => {
    const dep = actualDepart(d);
    if (dep < cutoff) return;
    const { arr, pf: arrPf } = exactArrival(d.serviceNumber, arrRTD);
    if (!arr) return;
    const total = Math.round(diffMin(dep, arr));
    journeys.push({
      type: 'Direct', totalMin: total, dep, arr,
      legs: [{ from: 'Amsterdam Centraal', dep, to: 'Rotterdam Centraal', arr,
               pf: d.platform, arrPf, train: d }]
    });
  });

  // 2. Via Schiphol: ASD → SHL → RTD (change at Schiphol)
  const shlToRtd = shl.filter(d => goesVia(d, 'rotterdam'));
  asd.filter(d => goesVia(d, 'schiphol') && !goesVia(d, 'rotterdam')).forEach(d => {
    const dep1 = actualDepart(d);
    if (dep1 < cutoff) return;
    const { arr: shlArr, pf: shlArrPf } = exactArrival(d.serviceNumber, arrSHL);
    if (!shlArr) return;
    const conn = shlToRtd.find(s => {
      const gap = diffMin(shlArr, actualDepart(s));
      return gap >= 0 && gap < 90;
    });
    if (!conn) return;
    const dep2 = actualDepart(conn);
    const xfer = Math.round(diffMin(shlArr, dep2));
    const { arr, pf: arrPf } = exactArrival(conn.serviceNumber, arrRTD);
    if (!arr) return;
    const total = Math.round(diffMin(dep1, arr));
    journeys.push({
      type: 'Via Schiphol', totalMin: total, dep: dep1, arr,
      xfer, xferMin: shlMin, possible: xfer >= shlMin,
      legs: [
        { from: 'Amsterdam Centraal', dep: dep1, to: 'Schiphol', arr: shlArr, pf: d.platform, arrPf: shlArrPf, train: d },
        { xfer: true, mins: xfer, min: shlMin },
        { from: 'Schiphol', dep: dep2, to: 'Rotterdam Centraal', arr, pf: conn.platform, arrPf, train: conn }
      ]
    });
  });

  // 3. Metro ASD → ASDZ + train to RTD (train arrival exact; metro wait from GVB timetable)
  deps.asdz.filter(d => goesVia(d, 'rotterdam')).forEach(d => {
    const trainDep = actualDepart(d);
    const metro    = getMetroTime(trainDep);
    const asdDep   = addMin(trainDep, -metro.total);
    if (asdDep < cutoff) return;
    const { arr, pf: arrPf } = exactArrival(d.serviceNumber, arrRTD);
    if (!arr) return;
    const total = Math.round(diffMin(asdDep, arr));
    journeys.push({
      type: 'Via Amsterdam Zuid', totalMin: total, dep: asdDep, arr,
      legs: [
        { from: 'Amsterdam Centraal', dep: asdDep, to: 'Amsterdam Zuid', arr: trainDep,
          metro: true, metroMin: metro.total, metroFreq: metro.freq },
        { from: 'Amsterdam Zuid', dep: trainDep, to: 'Rotterdam Centraal', arr,
          pf: d.platform, arrPf, train: d }
      ]
    });
  });

  return dedup(journeys);
}

function calcRTDtoAMS(deps, arrASD, arrSHL, arrASDZ, refTime) {
  const { rtd, shl } = deps;
  const cutoff  = addMin(refTime, -3);
  const journeys = [];

  // 1. Direct RTD → ASD
  rtd.filter(d => goesTo(d, 'amsterdam centraal')).forEach(d => {
    const dep = actualDepart(d);
    if (dep < cutoff) return;
    const { arr, pf: arrPf } = exactArrival(d.serviceNumber, arrASD);
    if (!arr) return;
    const total = Math.round(diffMin(dep, arr));
    journeys.push({
      type: 'Direct', totalMin: total, dep, arr,
      legs: [{ from: 'Rotterdam Centraal', dep, to: 'Amsterdam Centraal', arr,
               pf: d.platform, arrPf, train: d }]
    });
  });

  // 2. Via Schiphol: RTD → SHL → ASD
  const shlToAsd = shl.filter(d => goesVia(d, 'amsterdam'));
  rtd.filter(d => goesVia(d, 'schiphol') && !goesTo(d, 'amsterdam centraal')).forEach(d => {
    const dep1 = actualDepart(d);
    if (dep1 < cutoff) return;
    const { arr: shlArr, pf: shlArrPf } = exactArrival(d.serviceNumber, arrSHL);
    if (!shlArr) return;
    const conn = shlToAsd.find(s => {
      const gap = diffMin(shlArr, actualDepart(s));
      return gap >= 0 && gap < 90;
    });
    if (!conn) return;
    const dep2 = actualDepart(conn);
    const xfer = Math.round(diffMin(shlArr, dep2));
    const { arr, pf: arrPf } = exactArrival(conn.serviceNumber, arrASD);
    if (!arr) return;
    const total = Math.round(diffMin(dep1, arr));
    journeys.push({
      type: 'Via Schiphol', totalMin: total, dep: dep1, arr,
      xfer, xferMin: shlMin, possible: xfer >= shlMin,
      legs: [
        { from: 'Rotterdam Centraal', dep: dep1, to: 'Schiphol', arr: shlArr, pf: d.platform, arrPf: shlArrPf, train: d },
        { xfer: true, mins: xfer, min: shlMin },
        { from: 'Schiphol', dep: dep2, to: 'Amsterdam Centraal', arr, pf: conn.platform, arrPf, train: conn }
      ]
    });
  });

  // 3. RTD → ASDZ + Metro to ASD (ASDZ arrival exact; metro onward from GVB timetable)
  rtd.filter(d => goesVia(d, 'amsterdam zuid') || goesTo(d, 'amsterdam zuid')).forEach(d => {
    const dep1 = actualDepart(d);
    if (dep1 < cutoff) return;
    const { arr: asdzArr, pf: asdzArrPf } = exactArrival(d.serviceNumber, arrASDZ);
    if (!asdzArr) return;
    const metro  = getMetroTime(asdzArr);
    const asdArr = addMin(asdzArr, metro.total);
    const total  = Math.round(diffMin(dep1, asdArr));
    journeys.push({
      type: 'Via Amsterdam Zuid', totalMin: total, dep: dep1, arr: asdArr,
      legs: [
        { from: 'Rotterdam Centraal', dep: dep1, to: 'Amsterdam Zuid', arr: asdzArr,
          pf: d.platform, arrPf: asdzArrPf, train: d },
        { from: 'Amsterdam Zuid', dep: asdzArr, to: 'Amsterdam Centraal', arr: asdArr,
          metro: true, metroMin: metro.total, metroFreq: metro.freq }
      ]
    });
  });

  return dedup(journeys);
}

function dedup(journeys) {
  const seen = new Set();
  return journeys
    .filter(j => { const k = `${j.type}|${+j.dep}`; if (seen.has(k)) return false; seen.add(k); return true; })
    .sort((a, b) => +a.dep - +b.dep);
}

// ── Render ───────────────────────────────────────────────────────────
function renderJourneys(journeys) {
  const el = document.getElementById('journeyList');
  if (!journeys.length) {
    el.innerHTML = '<div class="empty">No journeys found for this time.<br>Try adjusting the departure time.</div>';
    return;
  }
  const fastest = [...journeys].sort((a, b) => a.totalMin - b.totalMin)[0];
  el.innerHTML = journeys.map(j => `
<div class="card">
  <div class="card-head">
    <div>
      <span class="route-tag">${j.type}</span>
      ${j === fastest ? '<span class="fastest-tag">Fastest</span>' : ''}
    </div>
    <span class="duration-tag">${fmtDur(j.totalMin)}</span>
  </div>
  <div class="timeline">
    ${renderDots(j.legs)}
    <div class="tl-stops">${j.legs.map(renderLeg).join('')}</div>
  </div>
</div>`).join('');
}

function renderDots(legs) {
  const p = [];
  legs.forEach((leg, i) => {
    if (leg.xfer) { p.push('<div class="tl-line dashed"></div>'); return; }
    if (leg.metro) {
      if (i === 0) p.push('<div class="dot"></div><div class="tl-line dashed"></div>');
      else         p.push('<div class="tl-line dashed"></div><div class="dot end"></div>');
      return;
    }
    const first = i === 0 || (i === 1 && legs[0].metro);
    const last  = i === legs.length - 1;
    if (first) p.push('<div class="dot"></div>');
    p.push(last ? '<div class="tl-line"></div><div class="dot end"></div>'
                : '<div class="tl-line"></div><div class="dot mid"></div><div class="tl-line"></div>');
  });
  return `<div class="tl-dots">${p.join('')}</div>`;
}

function renderLeg(leg) {
  if (leg.xfer) {
    const ok  = leg.mins >= leg.min;
    const cls = ok ? (leg.mins >= leg.min + 2 ? 'xfer-ok' : 'xfer-warn') : 'xfer-bad';
    return `
<div class="xfer">
  <div class="xfer-icon ${cls}">${ok ? '&#10003;' : '&#10005;'}</div>
  <div>
    <div class="xfer-text ${cls}">${leg.mins} min transfer &mdash; ${ok ? 'OK' : 'Too tight'}</div>
    <div class="xfer-sub">Your minimum: ${leg.min} min at Schiphol</div>
  </div>
</div>`;
  }

  if (leg.metro) {
    const info = `Every ${leg.metroFreq} min, ~14 min journey &mdash; GVB timetable`;
    if (leg.from === 'Amsterdam Centraal') {
      return `
<div class="stop">
  <div><div class="stop-time">${fmt(leg.dep)}</div></div>
  <div>
    <div class="stop-name">Amsterdam Centraal <span class="badge badge-metro">Metro 52</span></div>
    <div class="stop-detail">${info}</div>
  </div>
</div>`;
    }
    return `
<div class="stop" style="margin-top:4px">
  <div><div class="stop-time">${fmt(leg.dep)}</div></div>
  <div>
    <div class="stop-name">Amsterdam Zuid <span class="badge badge-metro">Metro 52</span></div>
    <div class="stop-detail">${info}</div>
  </div>
</div>
<div class="stop" style="margin-top:4px">
  <div><div class="stop-time est">${fmt(leg.arr)}</div></div>
  <div>
    <div class="stop-name">Amsterdam Centraal</div>
    <div class="stop-detail">Timetable estimate</div>
  </div>
</div>`;
  }

  const d        = leg.train;
  const delayTxt = d && d.delaySeconds > 60 ? `<span class="delay">+${Math.round(d.delaySeconds/60)}m</span>` : '';
  const badge    = d ? trainBadge(d) : '';
  const depPf = leg.pf    ? `Platform ${leg.pf}` : '';
  const arrPf = leg.arrPf ? `Platform ${leg.arrPf}` : '';

  return `
<div class="stop">
  <div><div class="stop-time">${fmt(leg.dep)}</div></div>
  <div>
    <div class="stop-name">${leg.from}${badge}${delayTxt}</div>
    ${depPf ? `<div class="stop-detail">${depPf}</div>` : ''}
  </div>
</div>
<div class="stop" style="margin-top:4px">
  <div><div class="stop-time">${fmt(leg.arr)}</div></div>
  <div>
    <div class="stop-name">${leg.to}</div>
    ${arrPf ? `<div class="stop-detail">${arrPf}</div>` : ''}
  </div>
</div>`;
}

// ── App control ──────────────────────────────────────────────────────
function flipDirection() {
  direction = direction === 'AMS_RTD' ? 'RTD_AMS' : 'AMS_RTD';
  const ams = direction === 'AMS_RTD';
  document.getElementById('dirFrom').textContent = ams ? 'Amsterdam C.' : 'Rotterdam C.';
  document.getElementById('dirTo').textContent   = ams ? 'Rotterdam C.' : 'Amsterdam C.';
  refresh();
}
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}
function changeShl(d) {
  shlMin = Math.max(1, Math.min(15, shlMin + d));
  localStorage.setItem('shl', shlMin);
  document.getElementById('shlVal').textContent = shlMin;
  refresh();
}
function clearTime() {
  document.getElementById('deptTime').value = '';
  refresh();
}
async function refresh() {
  if (isLoading) return;
  isLoading = true;
  if (refreshTimer) clearTimeout(refreshTimer);

  const live   = isLiveMode();
  const offset = getOffset();
  const refTime = getSelectedTime();

  document.getElementById('statusText').innerHTML =
    (live ? '<span class="live-dot"></span>' : '&#128344; ') + 'Refreshing...';
  document.getElementById('refreshBtn').style.opacity = '0.5';

  // If the selected time is too far ahead for the live API, show a warning
  if (!live && offset > MAX_OFFSET_MIN) {
    const selFmt = refTime.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' })
                 + ' ' + fmt(refTime);
    document.getElementById('journeyList').innerHTML = `
<div class="info-box">
  <div class="info-box-title">&#128344; Live data not available for ${selFmt}</div>
  <div class="info-box-text">
    This app uses real-time train data which is only available up to about 4 hours ahead.
    For journey planning further in the future, use:
    <br><br>
    &bull; <a href="https://www.ns.nl/en/journeyplanner/" target="_blank">NS.nl journey planner</a><br>
    &bull; The official NS app
    <br><br>
    The NS schedule for Monday is typically the same as any other weekday &mdash;
    you can use live mode now to see the times that would apply.
  </div>
</div>`;
    document.getElementById('statusText').innerHTML = '&#128344; Too far ahead';
    document.getElementById('refreshBtn').style.opacity = '1';
    isLoading = false;
    return;
  }

  try {
    // Fetch departures and exact arrivals at all relevant stations in parallel
    const [asd, asdz, shl, rtd, arrRTD, arrASD, arrSHL, arrASDZ] = await Promise.all([
      fetchDeps('ASD', offset), fetchDeps('ASDZ', offset),
      fetchDeps('SHL', offset), fetchDeps('RTD',  offset),
      fetchArrivals('RTD', offset), fetchArrivals('ASD', offset),
      fetchArrivals('SHL', offset), fetchArrivals('ASDZ', offset)
    ]);

    const deps     = { asd, asdz, shl, rtd };
    const journeys = direction === 'AMS_RTD'
      ? calcAMStoRTD(deps, arrRTD, arrSHL, refTime)
      : calcRTDtoAMS(deps, arrASD, arrSHL, arrASDZ, refTime);

    renderJourneys(journeys);

    const n = journeys.length;
    const timeLabel = live ? '' : ` from ${fmt(refTime)}`;
    document.getElementById('statusText').innerHTML =
      (live ? '<span class="live-dot"></span>' : '&#128344; ') +
      `${n} option${n !== 1 ? 's' : ''}${timeLabel}`;
    document.getElementById('updatedText').textContent = `Updated ${fmt(new Date())}`;

  } catch (err) {
    document.getElementById('journeyList').innerHTML = `
<div class="error">
  <div class="error-title">Could not load train times</div>
  <div class="error-sub">${err.message || 'Check your connection and try again'}</div>
  <button class="retry-btn" onclick="refresh()">Try again</button>
</div>`;
    document.getElementById('statusText').textContent = 'Error';
  }

  document.getElementById('refreshBtn').style.opacity = '1';
  isLoading = false;
  if (live) refreshTimer = setTimeout(refresh, 60000);
}

// ── Init ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

(function() {
  try {
    const c = document.createElement('canvas'); c.width = c.height = 180;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#00587a';
    if (ctx.roundRect) ctx.roundRect(0,0,180,180,40); else ctx.rect(0,0,180,180);
    ctx.fill();
    ctx.font = '90px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('\u{1F686}', 90, 95);
    const link = document.createElement('link'); link.rel = 'apple-touch-icon'; link.href = c.toDataURL();
    document.head.appendChild(link);
  } catch(e) {}
})();

refresh();
</script>
